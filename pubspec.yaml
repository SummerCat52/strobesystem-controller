name: strobe_controller_mobile
description: Offline-first Flutter app for configuring and controlling Arduino or ESP32 strobe systems.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  file_picker: ^8.1.2
  flutter_blue_plus: ^1.35.5
  permission_handler: ^12.0.1
  provider: ^6.1.2
  share_plus: ^10.0.2
  shared_preferences: ^2.5.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/examples/
